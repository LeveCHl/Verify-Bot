<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>認証結果</title>
  <style>
    body {
      background: #1e1f22;
      color: #fff;
      font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #2b2d31;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #b5bac1; }
    .success { color: #23a55a; }
    .fail { color: #f23f43; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">{{ "✅" if success else "⚠️" }}</div>
    <h1 class="{{ 'success' if success else 'fail' }}">
      {{ "認証完了" if success else "認証エラー" }}
    </h1>
    <p>{{ message }}</p>
  </div>
</body>
</html>
